      w.innerHTML='<h3>🌿 What’s planted'+(bed?' in “'+esc(bed.name)+'”':'')+'?</h3><p class="wsub">Add a few — they link to the Fert &amp; Pest Guide. Optional.</p>'+bar()+
        (bed?('<div class="row"><div class="fld"><label>Type</label><select class="in" data-w="ptype">'+opts+'</select></div>'+
        '<div class="fld"><label>Name (optional)</label><input class="in" data-w="pname" placeholder="variety"></div>'+
        '<div class="fld"><label>Qty</label><input class="in" style="width:74px" type="number" min="1" value="1" data-w="pqty"></div>'+
        '<button class="btn ghost" data-w="addplant">+ Add</button></div>'):'<p class="wsub">Add a bed first to list plants.</p>')+
        planted+
        '<div class="wact"><button class="skip" data-w="skip">Skip</button><div class="right"><button class="btn ghost" data-w="back">← Back</button><button class="btn" data-w="next">Next →</button></div></div>';
    } else {
      const L=USERCFG.location,c=USERCFG.climate;
      w.innerHTML='<h3>✅ You’re set'+(L?', '+esc(L.city):'')+'!</h3><p class="wsub">Your garden is ready. Here’s what we’ve got — you can refine any of it in the <b>My Garden</b> and <b>Beds &amp; Plants</b> tabs.</p>'+bar()+
        '<ul class="wlist">'+
        (L?'<li>📍 '+esc(L.city)+(L.province?', '+esc(L.province):'')+(c?' — Zone ~'+c.zone+', last frost ~'+fmtMD(c.lastFrost):'')+'</li>':'')+
        '<li>🛏️ '+USERCFG.beds.length+' bed(s), '+USERCFG.beds.reduce((n,b)=>n+b.plants.length,0)+' planting(s)</li>'+
        '<li>🔑 Add a DeepSeek key in the Diagnose tab to ID plant problems from a photo</li>'+
        '</ul>'+
        '<div class="wact"><span></span><div class="right"><button class="btn" data-w="done">Open my dashboard →</button></div></div>';
    }
    ov.innerHTML='';ov.appendChild(w);
  }
  ov.addEventListener('click',e=>{
    const t=e.target.closest('[data-w]');if(!t)return;const act=t.dataset.w;
    if(act==='find'){
      const inp=ov.querySelector('[data-w=city]'),st=ov.querySelector('[data-w=st]');
      const q=(inp.value||'').trim();if(!q){st.textContent='Type a city first.';return;}
      st.textContent='Looking up '+q+'…';
      geocodeCity(q).then(loc=>{USERCFG.location=loc;const c=applyDerivedClimate(loc);loc.zone=c.zone;saveCfg();render();}).catch(err=>{st.textContent='Error: '+(err.message||err);});
    }
    else if(act==='next'){if(step<STEPS){step++;render();}}
    else if(act==='back'){if(step>1){step--;render();}}
    else if(act==='skip'){finish();}
    else if(act==='done'){finish();}
    else if(act==='addbed'){
      const nm=(ov.querySelector('[data-w=bname]').value||'New bed').trim();
      const len=parseFloat(ov.querySelector('[data-w=blen]').value)||0,wid=parseFloat(ov.querySelector('[data-w=bwid]').value)||0;
      USERCFG.beds.push({id:uid(),name:nm,length_m:len,width_m:wid,plants:[]});saveCfg();step=3;render();
    }
    else if(act==='addplant'){
      const bed=USERCFG.beds[USERCFG.beds.length-1];if(!bed)return;
      const type=ov.querySelector('[data-w=ptype]').value,name=(ov.querySelector('[data-w=pname]').value||'').trim(),qty=parseInt(ov.querySelector('[data-w=pqty]').value)||1;
      bed.plants.push({type:type,name:name,qty:qty});saveCfg();render();
    }
  });
  render();document.body.appendChild(ov);
}

function initTheme(){
  let th='day';try{th=localStorage.getItem('gardenTheme')||'day';}catch(e){}
  setTheme(th);
  document.getElementById('themeBtn').onclick=()=>setTheme(document.documentElement.dataset.theme==='day'?'night':'day');
}
function setTheme(t){
  document.documentElement.dataset.theme=t;
  document.getElementById('themeBtn').innerHTML=t==='day'?I.moon:I.sun;
  document.querySelector('meta[name=theme-color]').setAttribute('content',t==='day'?'#dfe7d8':'#0d1410');
  try{localStorage.setItem('gardenTheme',t);}catch(e){}
  if(window._booted){drawSeasonRing();if(CUR===0)paintChart();} // repaint color-dependent SVG
}
/* ===================== severe-weather alerts ===================== */
I.bell='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>';
I.bellOn='<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0" fill="none" stroke-linecap="round"/></svg>';
const WX_ALERT_CFG={hardFreeze:-4,heat:29,highWind:60,severeWind:80,heavyRain:25};
let ALERTS_ON=false; try{ALERTS_ON=localStorage.getItem('gardenAlertsOn')==='1';}catch(e){}
function persistAlerts(){try{localStorage.setItem('gardenAlertsOn',ALERTS_ON?'1':'0');}catch(e){}}
function alertSeen(){try{return JSON.parse(localStorage.getItem('gardenAlertSeen')||'[]');}catch(e){return [];}}
function markSeen(keys){try{const c=alertSeen(),m=c.concat(keys.filter(k=>c.indexOf(k)<0)).slice(-60);localStorage.setItem('gardenAlertSeen',JSON.stringify(m));}catch(e){}}
function weatherAlerts(){
  if(!WX||!WX.next_7d)return [];
  const FT=(DATA.watering&&DATA.watering.FROST_TMIN_C!=null)?DATA.watering.FROST_TMIN_C:0;
  const out=[],days=WX.next_7d.days||[];
  days.slice(0,3).forEach(function(x){
    const when=fmtDate(x.date);
    if(x.tmin_c!=null&&x.tmin_c<=WX_ALERT_CFG.hardFreeze)
      out.push({key:'freeze:'+x.date,level:'severe',icon:'❄',title:'Hard freeze '+when,body:'Low '+Math.round(x.tmin_c)+'°C — bring in or cover tender plants and harvest what you can.'});
    else if(x.tmin_c!=null&&x.tmin_c<=FT)
      out.push({key:'frost:'+x.date,level:'warn',icon:'❄',title:'Frost risk '+when,body:'Low '+Math.round(x.tmin_c)+'°C — cover basil, peppers and tomatoes tonight.'});
    if(x.tmax_c!=null&&x.tmax_c>=WX_ALERT_CFG.heat)
      out.push({key:'heat:'+x.date,level:'warn',icon:'☀',title:'Heat spike '+when,body:'High '+Math.round(x.tmax_c)+'°C — water deeply in the morning and shade seedlings.'});
    if(x.wind_gust_kmh!=null&&x.wind_gust_kmh>=WX_ALERT_CFG.severeWind)
      out.push({key:'wind:'+x.date,level:'severe',icon:'🌬',title:'Damaging wind '+when,body:'Gusts to '+Math.round(x.wind_gust_kmh)+' km/h — stake tall plants, secure covers, shelter pots.'});
    else if(x.wind_gust_kmh!=null&&x.wind_gust_kmh>=WX_ALERT_CFG.highWind)
      out.push({key:'wind:'+x.date,level:'warn',icon:'🌬',title:'High wind '+when,body:'Gusts to '+Math.round(x.wind_gust_kmh)+' km/h — stake and secure covers.'});
    const wc=x.wcode;
    if(wc!=null&&wc>=95)
      out.push({key:'storm:'+x.date,level:'severe',icon:'⛈',title:'Thunderstorm '+when,body:(wc>=96?'Hail possible — ':'')+'shelter pots and seedlings; check covers and stakes.'});
    if(x.precip_mm!=null&&x.precip_mm>=WX_ALERT_CFG.heavyRain)
      out.push({key:'rain:'+x.date,level:'warn',icon:'🌧',title:'Heavy rain '+when,body:Math.round(x.precip_mm)+' mm expected — skip watering; watch for waterlogging and slugs.'});
  });
  const seen={};return out.filter(a=>seen[a.key]?false:(seen[a.key]=true));
}
function setBellState(){const b=document.getElementById('alertBtn');if(b){b.innerHTML=ALERTS_ON?I.bellOn:I.bell;b.style.color=ALERTS_ON?'var(--amber)':'';}}
function toggleAlerts(){
  if(!ALERTS_ON){
    if('Notification'in window&&Notification.permission!=='granted'){
      Notification.requestPermission().then(function(){ALERTS_ON=true;persistAlerts();setBellState();runWeatherAlerts();});
    } else {ALERTS_ON=true;persistAlerts();setBellState();runWeatherAlerts();}
  } else {ALERTS_ON=false;persistAlerts();setBellState();}
}
function setupAlertUI(){
  if(!document.getElementById('wxAlertBar')){
    const bar=document.createElement('div');bar.id='wxAlertBar';bar.style.display='none';
    const hdr=document.querySelector('header.masthead');
    if(hdr&&hdr.parentNode)hdr.parentNode.insertBefore(bar,hdr.nextSibling);
  }
  const mr=document.querySelector('.mast-right');
  if(mr&&!document.getElementById('alertBtn')){
    const b=document.createElement('button');b.className='theme-btn';b.id='alertBtn';
    b.title='Severe-weather alerts';b.setAttribute('aria-label','Toggle severe-weather alerts');
    b.addEventListener('click',toggleAlerts);
    mr.insertBefore(b,document.getElementById('themeBtn')||null);
    setBellState();
  }
}
function renderAlertBar(alerts){
  const bar=document.getElementById('wxAlertBar');if(!bar)return;
  if(!alerts.length){bar.innerHTML='';bar.style.display='none';return;}
  bar.style.display='block';
  const items=alerts.map(a=>'<div class="wxa '+a.level+'"><span class="wxa-i">'+a.icon+'</span><div><b>'+esc(a.title)+'</b> — '+esc(a.body)+'</div></div>').join('');
  const hint=ALERTS_ON?'':'<button class="wxa-enable" id="wxaEnable">🔔 Get these as phone / desktop alerts</button>';
  bar.innerHTML='<div class="wrap wxa-wrap">'+items+hint+'</div>';
  const en=document.getElementById('wxaEnable');if(en)en.addEventListener('click',toggleAlerts);
}
function notifyAlerts(alerts){
  if(!ALERTS_ON||!('Notification'in window)||Notification.permission!=='granted')return;
  const seen=alertSeen(),fresh=alerts.filter(a=>seen.indexOf(a.key)<0);
  fresh.slice(0,3).forEach(function(a){try{const n=new Notification('Garden Ops — '+a.title,{body:a.body,icon:'favicon-32.png',tag:a.key});n.onclick=function(){try{window.focus();}catch(e){}n.close();};}catch(e){}});
  if(fresh.length)markSeen(fresh.map(a=>a.key));
}
function runWeatherAlerts(){const a=weatherAlerts();renderAlertBar(a);notifyAlerts(a);}

async function boot(){
  initTheme();
  if(USERCFG.location&&!USERCFG.climate){applyDerivedClimate(USERCFG.location);if(!USERCFG.location.zone)USERCFG.location.zone=USERCFG.climate.zone;saveCfg();}
  refreshGarden();
  renderMast();mountTabs();applyUserMast();
  const app=document.getElementById('app');app.innerHTML='';app.appendChild(PANES[0][2]());app.appendChild(footer());
  window._booted=true;
  if(needsOnboarding())startWizard(); else applyHash();
  setupAlertUI();
  await fetchWeather();paintWeather();runWeatherAlerts();
  setInterval(async function(){await fetchWeather();if(CUR===0)paintWeather();runWeatherAlerts();},1800000);
}
boot();
</script>
